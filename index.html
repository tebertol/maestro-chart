<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Maestro Capital Research — Chart Replay</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightweight-charts/4.1.3/lightweight-charts.standalone.production.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#0a0b0d; --panel:#101216; --panel2:#15181e; --line:#22262e;
    --txt:#c9ced8; --dim:#7c828d; --buy:#2f7bff; --sell:#e23b4e;
    --up:#26c281; --down:#ec4d5a; --ema20:#d4e84a; --ema50:#3b9bff; --sma200:#ff4d4d; --bb:#e9e9e9;
    --mono:ui-monospace,"SF Mono","Roboto Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    background:var(--bg);color:var(--txt);font-family:var(--sans);font-size:13px;
    display:grid;grid-template-rows:auto 1fr auto;overflow:hidden;
  }
  /* ---------- top toolbar ---------- */
  .toolbar{
    display:flex;align-items:center;gap:14px;padding:8px 14px;border-bottom:1px solid var(--line);
    background:linear-gradient(#101216,#0c0e12);
  }
  .brand{font-weight:700;letter-spacing:.16em;font-size:12px;text-transform:uppercase;color:#eef1f6}
  .brand b{color:var(--buy)}
  .sym{font-family:var(--mono);color:var(--dim);font-size:12px}
  .spacer{flex:1}
  .legend{display:flex;gap:13px;font-family:var(--mono);font-size:11px;color:var(--dim);flex-wrap:wrap}
  .legend .k{cursor:pointer;user-select:none;white-space:nowrap}
  .legend .k.off{opacity:.32;text-decoration:line-through}
  .legend .dot{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:5px;vertical-align:1px}
  .legend .v{color:var(--txt)}
  button,select,input{font-family:var(--sans);color:var(--txt)}
  .btn{
    background:var(--panel2);border:1px solid var(--line);border-radius:6px;color:var(--txt);
    padding:6px 11px;cursor:pointer;font-size:12px;font-weight:600;
  }
  .btn:hover{border-color:#39414d;background:#1b1f27}
  /* ---------- main ---------- */
  .main{display:grid;grid-template-columns:1fr 234px;min-height:0}
  .chartwrap{position:relative;min-width:0;background:#000}
  #grid{position:absolute;inset:0;z-index:0;pointer-events:none}
  #chart{position:absolute;inset:0;z-index:1}
  .ohlc{
    position:absolute;left:10px;top:8px;z-index:3;font-family:var(--mono);font-size:11px;
    color:var(--dim);pointer-events:none;line-height:1.55;text-shadow:0 1px 2px #000;
  }
  .ohlc span{color:var(--txt)}
  /* ---------- right order pane ---------- */
  .pane{
    border-left:1px solid var(--line);background:var(--panel);padding:10px;
    display:flex;flex-direction:column;gap:8px;overflow-y:auto;
  }
  .grp{border:1px solid var(--line);border-radius:7px;padding:9px;background:var(--panel2)}
  .grp .h{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-bottom:7px}
  .ord{display:grid;grid-template-columns:1fr 1fr;gap:7px}
  .ord button{height:52px;border:none;border-radius:6px;cursor:pointer;color:#fff;font-weight:700;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:13px}
  .ord button small{font-family:var(--mono);font-size:13px;font-weight:600;opacity:.95}
  .ord .buy{background:var(--buy)} .ord .buy:hover{background:#3f88ff}
  .ord .sell{background:var(--sell)} .ord .sell:hover{background:#ec4f60}
  .wide{grid-column:1/3}
  .rev{background:#7a5a16;color:#ffe6ad} .rev:hover{background:#8c6a22}
  .flat{background:#2a2f38;color:var(--txt)} .flat:hover{background:#343b46}
  .ord .rev,.ord .flat{height:34px;font-size:12px;flex-direction:row}
  .field{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:6px 0}
  .field label{font-size:11px;color:var(--dim)}
  .field input,.field select{
    width:88px;background:#0b0d11;border:1px solid var(--line);border-radius:5px;
    padding:5px 7px;font-family:var(--mono);font-size:12px;text-align:right;
  }
  .field input:focus,.field select:focus{outline:none;border-color:var(--buy)}
  /* equity readout */
  .eq{text-align:right}
  .eq .big{font-family:var(--mono);font-size:22px;font-weight:700;color:#fff}
  .eq .row{display:flex;justify-content:space-between;font-family:var(--mono);font-size:12px;margin-top:5px}
  .eq .row span:first-child{color:var(--dim);font-family:var(--sans);font-size:11px}
  .pos-flat{color:var(--dim)} .pos-long{color:var(--up)} .pos-short{color:var(--down)}
  .pl-pos{color:var(--up)} .pl-neg{color:var(--down)} .pl-zero{color:var(--dim)}
  /* ---------- bottom replay bar ---------- */
  .controls{
    display:flex;align-items:center;gap:14px;padding:9px 14px;border-top:1px solid var(--line);
    background:linear-gradient(#0c0e12,#101216);
  }
  .controls .play{background:var(--up);color:#06251a;border:none;width:40px;height:34px;border-radius:6px;
    font-size:15px;cursor:pointer;font-weight:700}
  .controls .play.on{background:#e7b53b;color:#3a2c05}
  .ic{background:var(--panel2);border:1px solid var(--line);border-radius:6px;width:36px;height:34px;
    cursor:pointer;font-size:14px}
  .ic:hover{background:#1b1f27}
  .speedwrap{display:flex;align-items:center;gap:9px;flex:1;max-width:430px}
  .speedwrap label{font-size:11px;color:var(--dim);letter-spacing:.08em;text-transform:uppercase}
  input[type=range]{flex:1;accent-color:var(--buy)}
  .rate{font-family:var(--mono);font-size:12px;color:var(--txt);min-width:74px;text-align:right}
  .progress{font-family:var(--mono);font-size:12px;color:var(--dim);min-width:128px;text-align:right}
  .hidden{display:none}
  @media (max-width:760px){
    .main{grid-template-columns:1fr}
    .pane{border-left:none;border-top:1px solid var(--line);max-height:46vh}
    .legend{display:none}
  }
</style>
</head>
<body>

  <!-- ============ TOOLBAR ============ -->
  <div class="toolbar">
    <div class="brand"><b>MAESTRO</b> CAPITAL RESEARCH</div>
    <div class="sym" id="symLabel">NQ · 1000 tick</div>
    <button class="btn" id="importBtn">⤓ Import data</button>
    <input type="file" id="fileInput" class="hidden" accept=".csv,.xlsx,.xls,.tsv,.txt">
    <div class="spacer"></div>
    <div class="legend" id="legend">
      <span class="k" data-s="ema20"><span class="dot" style="background:var(--ema20)"></span>EMA20 <span class="v" id="vEma20">—</span></span>
      <span class="k" data-s="ema50"><span class="dot" style="background:var(--ema50)"></span>EMA50 <span class="v" id="vEma50">—</span></span>
      <span class="k" data-s="sma200"><span class="dot" style="background:var(--sma200)"></span>SMA200 <span class="v" id="vSma200">—</span></span>
      <span class="k" data-s="bb"><span class="dot" style="background:var(--bb)"></span>BB(20,2) <span class="v" id="vBb">—</span></span>
    </div>
  </div>

  <!-- ============ MAIN ============ -->
  <div class="main">
    <div class="chartwrap">
      <canvas id="grid"></canvas>
      <div id="chart"></div>
      <div class="ohlc" id="ohlc"></div>
    </div>

    <!-- right order pane -->
    <div class="pane">
      <div class="grp">
        <div class="h">Place Order</div>
        <div class="ord">
          <button class="buy" id="buyBtn">BUY<small id="buyPx">—</small></button>
          <button class="sell" id="sellBtn">SELL<small id="sellPx">—</small></button>
          <button class="rev wide" id="revBtn">⇄ Reverse position</button>
          <button class="flat wide" id="flatBtn">Flatten</button>
        </div>
      </div>

      <div class="grp">
        <div class="h">Account</div>
        <div class="eq">
          <div class="big" id="eqVal">$100,000</div>
          <div class="row"><span>Open P&amp;L</span><span id="openPl" class="pl-zero">$0</span></div>
          <div class="row"><span>Realized</span><span id="realPl" class="pl-zero">$0</span></div>
          <div class="row"><span>Position</span><span id="posLbl" class="pos-flat">FLAT</span></div>
        </div>
      </div>

      <div class="grp">
        <div class="h">Settings</div>
        <div class="field"><label>Contracts / trade</label><input id="cpt" type="number" min="1" step="1" value="1"></div>
        <div class="field"><label>$ per point</label><input id="ptVal" type="number" min="0" step="0.5" value="20"></div>
        <div class="field"><label>Commission / contract</label><input id="comm" type="number" min="0" step="0.01" value="0"></div>
        <div class="field"><label>Starting equity</label><input id="startEq" type="number" min="0" step="1000" value="100000"></div>
        <div class="field"><label>Grid increment</label>
          <select id="gridInc"><option>0</option><option>1</option><option selected>10</option><option>25</option><option>100</option><option>1000</option></select>
        </div>
      </div>
    </div>
  </div>

  <!-- ============ REPLAY CONTROLS ============ -->
  <div class="controls">
    <button class="play" id="playBtn" title="Start / pause">▶</button>
    <button class="ic" id="stepBtn" title="Step one bar">⏭</button>
    <button class="ic" id="resetBtn" title="Rewind to start">⏮</button>
    <div class="speedwrap">
      <label>Speed</label>
      <input type="range" id="speed" min="1" max="100" value="35">
      <div class="rate" id="rate">~14 bars/s</div>
    </div>
    <div class="spacer"></div>
    <div class="progress" id="progress">bar 0 / 0</div>
  </div>

/* ---------- helpers ---------- */
const pad=x=>String(x).padStart(2,'0');
function hms(t){const d=new Date(t*1000);return pad(d.getUTCHours())+':'+pad(d.getUTCMinutes())+':'+pad(d.getUTCSeconds());}
function md(t){const d=new Date(t*1000);return (d.getUTCMonth()+1)+'/'+d.getUTCDate();}
const fmtMoney=v=>(v<0?'-$':'$')+Math.abs(v).toLocaleString('en-US',{maximumFractionDigits:0});
const fmtMoney2=v=>(v<0?'-$':'$')+Math.abs(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtPx=v=>v==null?'—':v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});

/* ---------- indicators (computed over full dataset) ---------- */
function computeIndicators(bars){
  const c=bars.map(b=>b.close), n=c.length;
  const ema=(arr,len)=>{const k=2/(len+1),out=new Array(arr.length);let p=arr.length?arr[0]:0;
    for(let i=0;i<arr.length;i++){p=i===0?arr[0]:arr[i]*k+p*(1-k);out[i]=p;}return out;};
  const sma=(arr,len)=>{const out=new Array(arr.length).fill(null);let s=0;
    for(let i=0;i<arr.length;i++){s+=arr[i];if(i>=len)s-=arr[i-len];if(i>=len-1)out[i]=s/len;}return out;};
  const ema20=ema(c,20), ema50=ema(c,50), sma200=sma(c,200);
  const bbU=new Array(n).fill(null), bbL=new Array(n).fill(null), L=20;
  let s=0,sq=0;
  for(let i=0;i<n;i++){s+=c[i];sq+=c[i]*c[i];if(i>=L){s-=c[i-L];sq-=c[i-L]*c[i-L];}
    if(i>=L-1){const m=s/L,v=Math.max(sq/L-m*m,0),sd=Math.sqrt(v);bbU[i]=m+2*sd;bbL[i]=m-2*sd;}}
  return {ema20,ema50,sma200,bbU,bbL};
}

/* ---------- soft price gridlines (overlay canvas) ---------- */
const gridC=document.getElementById('grid'), gctx=gridC.getContext('2d');
function sizeGrid(){const r=chartEl.getBoundingClientRect(),dpr=window.devicePixelRatio||1;
  gridC.width=r.width*dpr;gridC.height=r.height*dpr;gridC.style.width=r.width+'px';gridC.style.height=r.height+'px';
  gctx.setTransform(dpr,0,0,dpr,0,0);}
function drawGrid(){
  const r=chartEl.getBoundingClientRect();gctx.clearRect(0,0,r.width,r.height);
  const inc=state.gridInc;
  if(inc>0 && state.cursor>=0){
    const top=candle.coordinateToPrice(0), bot=candle.coordinateToPrice(r.height);
    if(top!=null&&bot!=null){
      const hi=Math.max(top,bot),lo=Math.min(top,bot);
      if((hi-lo)/inc<=1500){
        gctx.strokeStyle='rgba(255,255,255,0.055)';gctx.lineWidth=1;
        for(let p=Math.ceil(lo/inc)*inc;p<=hi;p+=inc){
          const y=candle.priceToCoordinate(p);if(y==null)continue;
          gctx.beginPath();gctx.moveTo(0,Math.round(y)+.5);gctx.lineTo(r.width,Math.round(y)+.5);gctx.stroke();}
      }
    }
  }
  requestAnimationFrame(drawGrid);
}

/* ---------- render helpers ---------- */
const toC=b=>({time:b.time,open:b.open,high:b.high,low:b.low,close:b.close});
function lineData(key,upto){const arr=state.ind[key],out=[];
  for(let i=0;i<=upto;i++){if(arr[i]!=null)out.push({time:state.bars[i].time,value:arr[i]});}return out;}
function renderUpTo(idx){
  state.cursor=idx;
  candle.setData(state.bars.slice(0,idx+1).map(toC));
  sEma20.setData(lineData('ema20',idx)); sEma50.setData(lineData('ema50',idx)); sSma200.setData(lineData('sma200',idx));
  sBbU.setData(lineData('bbU',idx));     sBbL.setData(lineData('bbL',idx));
  applyVisibility(); updateProgress(); updateTradePanel(); updateLegendLatest();
}
function pushBar(i){
  const b=state.bars[i];
  candle.update(toC(b));
  for(const k of ['ema20','ema50','sma200']) if(state.ind[k][i]!=null) lineMap[k].update({time:b.time,value:state.ind[k][i]});
  if(state.ind.bbU[i]!=null){sBbU.update({time:b.time,value:state.ind.bbU[i]});sBbL.update({time:b.time,value:state.ind.bbL[i]});}
}

/* ---------- load a dataset ---------- */
function loadBars(bars,label){
  if(!bars.length)return;
  state.bars=bars; state.ind=computeIndicators(bars);
  resetTrades();
  if(label)document.getElementById('symLabel').textContent=label;
  renderUpTo(bars.length-1);            // show everything initially
  chart.timeScale().fitContent();
}
function sampleToBars(arr){
  let prev=null;return arr.map(r=>{let t=r[0];if(prev!=null&&t<=prev)t=prev+1;prev=t;
    return {time:t,open:r[1],high:r[2],low:r[3],close:r[4]};});}

/* ---------- replay engine ---------- */
function setDelayFromSpeed(){const s=+document.getElementById('speed').value;
  state.delay=Math.max(6,Math.round(520-5*s));
  document.getElementById('rate').textContent='~'+Math.round(1000/state.delay)+' bars/s';
  if(state.playing){stopTimer();startTimer();}}
function startTimer(){state.timer=setInterval(step,state.delay);}
function stopTimer(){clearInterval(state.timer);state.timer=null;}
function step(){
  if(state.cursor>=state.bars.length-1){pause();return;}
  pushBar(++state.cursor);
  updateProgress();updateTradePanel();updateLegendLatest();
}
function play(){
  if(!state.bars.length)return;
  if(state.cursor>=state.bars.length-1) rewind();   // auto-rewind at end
  state.playing=true;document.getElementById('playBtn').textContent='⏸';
  document.getElementById('playBtn').classList.add('on');
  startTimer();
}
function pause(){state.playing=false;stopTimer();
  const b=document.getElementById('playBtn');b.textContent='▶';b.classList.remove('on');}
function rewind(){
  pause();state.cursor=0;
  candle.setData([toC(state.bars[0])]);
  for(const s of [sEma20,sEma50,sSma200,sBbU,sBbL])s.setData([]);
  applyVisibility();updateProgress();updateTradePanel();updateLegendLatest();
}

/* ---------- trade simulation ---------- */
function priceNow(){return state.cursor>=0?state.bars[state.cursor].close:null;}
function resetTrades(){state.position=0;state.avgEntry=0;state.realized=0;updateTradePanel();}
function trade(qty){                      // qty: +buy / -sell  (signed contracts)
  const px=priceNow();if(px==null||!qty)return;
  state.realized-=Math.abs(qty)*state.commission;         // commission both sides
  const old=state.position;
  if(old===0||Math.sign(old)===Math.sign(qty)){           // open / add
    state.avgEntry=(Math.abs(old)*state.avgEntry+Math.abs(qty)*px)/(Math.abs(old)+Math.abs(qty));
    state.position=old+qty;
  }else{                                                  // reduce / flip
    const closed=Math.min(Math.abs(qty),Math.abs(old));
    state.realized+=closed*(px-state.avgEntry)*Math.sign(old)*state.pointValue;
    state.position=old+qty;
    if(Math.abs(qty)>Math.abs(old))state.avgEntry=px;     // flipped → new entry
    else if(state.position===0)state.avgEntry=0;
  }
  updateTradePanel();
}
function unrealized(){const px=priceNow();
  return (px==null||!state.position)?0:(px-state.avgEntry)*state.position*state.pointValue;}

/* ---------- UI updates ---------- */
function clsPl(v){return v>0.0001?'pl-pos':v<-0.0001?'pl-neg':'pl-zero';}
function updateTradePanel(){
  const px=priceNow();
  document.getElementById('buyPx').textContent =px==null?'—':fmtPx(px);
  document.getElementById('sellPx').textContent=px==null?'—':fmtPx(px);
  const up=unrealized(), real=state.realized, eq=state.startEquity+real+up;
  document.getElementById('eqVal').textContent=fmtMoney(eq);
  const o=document.getElementById('openPl');o.textContent=fmtMoney2(up);o.className=clsPl(up);
  const r=document.getElementById('realPl');r.textContent=fmtMoney2(real);r.className=clsPl(real);
  const p=document.getElementById('posLbl');
  if(state.position===0){p.textContent='FLAT';p.className='pos-flat';}
  else{const long=state.position>0;
    p.textContent=(long?'LONG ':'SHORT ')+Math.abs(state.position)+' @ '+fmtPx(state.avgEntry);
    p.className=long?'pos-long':'pos-short';}
}
function updateProgress(){document.getElementById('progress').textContent='bar '+(state.cursor+1)+' / '+state.bars.length;}
function legendVal(key,i){const v=state.ind[key][i];return v==null?'—':fmtPx(v);}
function updateLegendLatest(){setLegend(state.cursor);}
function setLegend(i){
  if(i<0){document.getElementById('ohlc').innerHTML='';return;}
  const b=state.bars[i];
  document.getElementById('vEma20').textContent =legendVal('ema20',i);
  document.getElementById('vEma50').textContent =legendVal('ema50',i);
  document.getElementById('vSma200').textContent=legendVal('sma200',i);
  document.getElementById('vBb').textContent=(state.ind.bbU[i]==null)?'—':fmtPx(state.ind.bbU[i])+' / '+fmtPx(state.ind.bbL[i]);
  const ch=b.close-b.open, col=ch>=0?'var(--up)':'var(--down)';
  document.getElementById('ohlc').innerHTML=
    `${md(b.time)} ${hms(b.time)} &nbsp; O <span>${fmtPx(b.open)}</span> H <span>${fmtPx(b.high)}</span> `+
    `L <span>${fmtPx(b.low)}</span> C <span style="color:${col}">${fmtPx(b.close)}</span>`;
}

/* ---------- visibility toggles ---------- */
function applyVisibility(){
  sEma20.applyOptions({visible:state.vis.ema20});
  sEma50.applyOptions({visible:state.vis.ema50});
  sSma200.applyOptions({visible:state.vis.sma200});
  sBbU.applyOptions({visible:state.vis.bb}); sBbL.applyOptions({visible:state.vis.bb});
}

/* ---------- data import (CSV / XLSX) ---------- */
function excelSerialToUTC(s){return Math.round((s-25569)*86400);}
function toEpoch(dateVal,timeVal){
  let y,mo,d,hh=0,mm=0,ss=0;
  if(typeof dateVal==='number'){
    const e=excelSerialToUTC(Math.floor(dateVal)),dt=new Date(e*1000);
    y=dt.getUTCFullYear();mo=dt.getUTCMonth()+1;d=dt.getUTCDate();
    const f=dateVal-Math.floor(dateVal);
    if(f>0&&(timeVal==null||timeVal==='')){const s=Math.round(f*86400);hh=s/3600|0;mm=s%3600/60|0;ss=s%60;}
  }else{
    const str=String(dateVal).trim();let m;
    if((m=str.match(/(\d{4})[-\/.](\d{1,2})[-\/.](\d{1,2})/))){y=+m[1];mo=+m[2];d=+m[3];}
    else if((m=str.match(/(\d{1,2})[-\/.](\d{1,2})[-\/.](\d{2,4})/))){mo=+m[1];d=+m[2];y=+m[3];if(y<100)y+=2000;}
    else return null;
    const tm=str.match(/(\d{1,2}):(\d{2})(?::(\d{2}))?/);if(tm&&(timeVal==null||timeVal==='')){hh=+tm[1];mm=+tm[2];ss=+(tm[3]||0);}
  }
  if(timeVal!=null&&timeVal!==''){
    if(typeof timeVal==='number'){const s=Math.round(timeVal*86400);hh=s/3600|0;mm=s%3600/60|0;ss=s%60;}
    else{const t=String(timeVal).match(/(\d{1,2}):(\d{2})(?::(\d{2}))?/);if(t){hh=+t[1];mm=+t[2];ss=+(t[3]||0);}}
  }
  if(y==null)return null;
  return Date.UTC(y,mo-1,d,hh,mm,ss)/1000;
}
function colIndex(headers,names){for(let i=0;i<headers.length;i++){const h=String(headers[i]).toLowerCase().trim();
  if(names.some(n=>h===n||h.includes(n)))return i;}return -1;}
function rowsToBars(rows){
  if(rows.length<2)throw new Error('Not enough rows.');
  const H=rows[0].map(x=>String(x).toLowerCase());
  const iDate=colIndex(H,['date']), iTime=colIndex(H,['time']),
        iDT=colIndex(H,['datetime','timestamp']),
        iO=colIndex(H,['open']),iHi=colIndex(H,['high']),iLo=colIndex(H,['low']),iC=colIndex(H,['close','last']);
  if(iO<0||iHi<0||iLo<0||iC<0)throw new Error('Could not find Open/High/Low/Close columns.');
  const out=[];let prev=null;
  for(let r=1;r<rows.length;r++){const row=rows[r];if(!row||row[iC]==null||row[iC]==='')continue;
    let t;
    if(iDT>=0)t=toEpoch(row[iDT],null);
    else if(iDate>=0)t=toEpoch(row[iDate],iTime>=0?row[iTime]:null);
    else t=(prev==null?0:prev+1);                 // fallback: synthetic sequence
    if(t==null)continue;
    if(prev!=null&&t<=prev)t=prev+1;prev=t;
    out.push({time:t,open:+row[iO],high:+row[iHi],low:+row[iLo],close:+row[iC]});}
  if(!out.length)throw new Error('No valid OHLC rows parsed.');
  return out;
}
function parseCSV(text){
  const sep=text.indexOf('\t')>=0&&text.indexOf(',')<0?'\t':',';
  return text.replace(/\r/g,'').split('\n').filter(l=>l.length).map(l=>l.split(sep));
}
function handleFile(file){
  const name=file.name.toLowerCase(), reader=new FileReader();
  reader.onload=e=>{
    try{
      let rows;
      if(name.endsWith('.csv')||name.endsWith('.txt')||name.endsWith('.tsv')){
        rows=parseCSV(e.target.result);
      }else{
        const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
        rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,raw:true,blankrows:false});
      }
      const bars=rowsToBars(rows);
      loadBars(bars,file.name.replace(/\.[^.]+$/,''));
    }catch(err){alert('Import failed: '+err.message+'\n\nExpected columns: Date, Time, Open, High, Low, Close (or a combined DateTime column).');}
  };
  if(name.endsWith('.csv')||name.endsWith('.txt')||name.endsWith('.tsv'))reader.readAsText(file);
  else reader.readAsArrayBuffer(file);
}

/* ---------- wire up controls ---------- */
document.getElementById('importBtn').onclick=()=>document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange=e=>{if(e.target.files[0])handleFile(e.target.files[0]);e.target.value='';};
document.getElementById('playBtn').onclick=()=>state.playing?pause():play();
document.getElementById('stepBtn').onclick=()=>{pause();step();};
document.getElementById('resetBtn').onclick=rewind;
document.getElementById('speed').oninput=setDelayFromSpeed;
document.getElementById('buyBtn').onclick=()=>trade(+state.cpt);
document.getElementById('sellBtn').onclick=()=>trade(-state.cpt);
document.getElementById('revBtn').onclick=()=>{if(state.position!==0)trade(-2*state.position);};
document.getElementById('flatBtn').onclick=()=>{if(state.position!==0)trade(-state.position);};
document.getElementById('cpt').oninput=e=>state.cpt=Math.max(1,+e.target.value||1);
document.getElementById('ptVal').oninput=e=>{state.pointValue=+e.target.value||0;updateTradePanel();};
document.getElementById('comm').oninput=e=>state.commission=+e.target.value||0;
document.getElementById('startEq').oninput=e=>{state.startEquity=+e.target.value||0;updateTradePanel();};
document.getElementById('gridInc').onchange=e=>state.gridInc=+e.target.value;
document.getElementById('legend').addEventListener('click',ev=>{
  const k=ev.target.closest('.k');if(!k)return;const key=k.dataset.s;
  state.vis[key]=!state.vis[key];k.classList.toggle('off',!state.vis[key]);applyVisibility();});

/* crosshair → legend readout */
chart.subscribeCrosshairMove(p=>{
  if(!p.time||!p.point){updateLegendLatest();return;}
  // find bar index by matching time
  let lo=0,hi=state.cursor,idx=state.cursor;
  while(lo<=hi){const m=(lo+hi)>>1;const t=state.bars[m].time;
    if(t===p.time){idx=m;break;}t<p.time?lo=m+1:hi=m-1;idx=Math.min(state.cursor,Math.max(0,lo));}
  setLegend(idx);
});

/* ---------- responsive sizing ---------- */
function resize(){const r=chartEl.getBoundingClientRect();chart.resize(r.width,r.height);sizeGrid();}
new ResizeObserver(resize).observe(chartEl);
window.addEventListener('resize',resize);

/* ---------- boot ---------- */
sizeGrid();
loadBars(sampleToBars(SAMPLE),'NQ · 1000 tick (sample)');
setDelayFromSpeed();
requestAnimationFrame(drawGrid);
</script>
</body>
